<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - POSCO Dry-Mode Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 h-screen flex items-center justify-center font-sans">
    
    <div class="bg-white p-10 rounded-lg shadow-xl w-96">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-900">POSCO 문장 검증 비서</h1>
            <p class="text-gray-500 text-sm mt-2">보안을 위해 발급받은 API 키로 접속하세요.</p>
        </div>
        
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="apiKey">
                Gemini API Key
            </label>
            <input class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" 
                   id="apiKey" type="password" placeholder="AIzaSy...">
        </div>
        
        <button onclick="login()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded focus:outline-none focus:shadow-outline transition duration-200">
            시스템 접속
        </button>
    </div>

    <script>
        // 페이지 로드 시 이미 로그인(키 저장)되어 있다면 바로 에디터로 이동
        if (localStorage.getItem('gemini_api_key')) {
            window.location.href = 'editor.html';
        }

        function login() {
            const key = document.getElementById('apiKey').value.trim();
            if (!key) {
                alert('API 키를 입력해주세요.');
                return;
            }
            
            // 브라우저 로컬 스토리지에 키 저장 (창을 닫아도 유지됨)
            localStorage.setItem('gemini_api_key', key);
            
            // 메인 에디터 화면으로 이동
            window.location.href = 'editor.html';
        }
    </script>
</body>
</html>
