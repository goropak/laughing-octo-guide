<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSCO Dry-Mode Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10 font-sans">

    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h1 class="text-2xl font-bold text-gray-800">POSCO Dry-Mode Editor</h1>
        <button onclick="logout()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 px-4 rounded font-bold">
            로그아웃
        </button>
    </div>
    
    <div class="grid grid-cols-2 gap-6">
        <div class="flex flex-col">
            <textarea id="inputText" class="p-4 border rounded shadow-sm h-96 resize-none focus:outline-blue-500" placeholder="보고서 초안을 붙여넣으세요..."></textarea>
            <button id="submitBtn" onclick="runCorrection()" class="mt-4 bg-blue-700 text-white font-bold py-3 rounded hover:bg-blue-800 transition duration-200">
                포스코 모드로 교정 시작
            </button>
        </div>

        <div id="resultArea" class="p-6 bg-white border rounded shadow-sm h-96 overflow-y-auto">
            <p class="text-gray-400 text-center mt-32">우측에 교정 결과가 표시됩니다.</p>
        </div>
    </div>

    <script>
        // 🚨 보안 체크: 로그인 정보(API 키)가 없으면 로그인 화면으로 강제 이동
        const API_KEY = localStorage.getItem('gemini_api_key');
        if (!API_KEY) {
            alert('로그인이 필요합니다.');
            window.location.href = 'index.html';
        }

        // 로그아웃 기능
        function logout() {
            localStorage.removeItem('gemini_api_key');
            window.location.href = 'index.html';
        }
        
        async function runCorrection() {
            const inputText = document.getElementById("inputText").value;
            if (!inputText) return alert("텍스트를 입력해주세요.");

            const btn = document.getElementById("submitBtn");
            const resultArea = document.getElementById("resultArea");
            
            btn.innerText = "AI 분석 및 교정 중...";
            btn.disabled = true;

            const systemInstruction = `
                당신은 포스코(POSCO) 투자엔지니어링실의 전문 비즈니스 문장 검증 AI입니다.
                [Step 1: 기본 교정] 오직 명백한 오타와 띄어쓰기만 교정합니다. 수치, 단위, 약어(5,500m³, CapEx 등)는 절대 훼손하지 마세요.
                [Step 2: 드라이 모드 제안] Step 1의 문장을 포스코 특유의 간결하고 팩트 중심적인 톤앤매너로 윤문하고 능동태로 변환합니다.
                
                반드시 아래 JSON 형식으로만 응답하고 다른 텍스트는 붙이지 마세요:
                {
                  "step1_basic_correction": "...",
                  "step2_advanced_suggestion": "...",
                  "step2_reasons": [{"before": "...", "after": "...", "reason": "..."}]
                }
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: inputText }] }],
                        systemInstruction: { role: "system", parts: [{ text: systemInstruction }] },
                        // 결과를 더 안정적인 JSON 형태로 받기 위한 설정
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error('API 호출 실패 (키가 잘못되었거나 한도를 초과했습니다)');

                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(rawText);

                let reasonsHtml = result.step2_reasons.map(item => 
                    `<li>• <span class="line-through">${item.before}</span> ➔ <strong>${item.after}</strong> (${item.reason})</li>`
                ).join("");

                resultArea.innerHTML = `
                    <div class="mb-6">
                        <h2 class="text-lg font-bold text-gray-700 border-b pb-2 mb-2">✅ 1단계: 기본 교정 (오타/띄어쓰기)</h2>
                        <p class="text-gray-800 bg-gray-50 p-3 rounded">${result.step1_basic_correction}</p>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-blue-700 border-b pb-2 mb-2">🚀 2단계: 드라이 모드 추천 (비즈니스 윤문)</h2>
                        <p class="text-gray-800 bg-blue-50 p-3 rounded font-medium">${result.step2_advanced_suggestion}</p>
                        <ul class="mt-3 text-sm text-gray-600 space-y-1">${reasonsHtml}</ul>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                alert("교정 중 오류가 발생했습니다. API 키를 다시 확인해주세요.");
                // 오류 발생 시 로그아웃 처리하여 다시 키를 입력받도록 유도할 수도 있습니다.
            } finally {
                btn.innerText = "포스코 모드로 교정 시작";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
