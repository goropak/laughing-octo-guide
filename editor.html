<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSCO Dry-Mode Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10 font-sans text-gray-900">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b pb-4 border-gray-300">
            <div class="flex items-center gap-3">
                <div class="bg-blue-900 text-white p-2 rounded font-bold text-xl">P</div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">POSCO Dry-Mode Editor</h1>
            </div>
            <button onclick="logout()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 px-4 rounded font-bold transition">
                로그아웃
            </button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col">
                <label class="text-sm font-bold text-gray-600 mb-2">원문 입력 (초안)</label>
                <textarea id="inputText" class="p-4 border border-gray-300 rounded shadow-inner h-[500px] resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 leading-relaxed text-gray-800" placeholder="교정할 보고서나 메일 초안을 붙여넣으세요..."></textarea>
                <button id="submitBtn" onclick="runCorrection()" class="mt-4 bg-blue-800 text-white font-bold py-4 rounded-lg shadow-md hover:bg-blue-900 transition duration-200 active:scale-95">
                    포스코 모드로 교정 시작 (Gemini 1.5 Flash)
                </button>
            </div>

            <div class="flex flex-col">
                <label class="text-sm font-bold text-gray-600 mb-2">교정 및 추천 결과</label>
                <div id="resultArea" class="p-6 bg-white border border-gray-300 rounded shadow-sm h-[500px] overflow-y-auto">
                    <div class="flex flex-col items-center justify-center h-full text-gray-400">
                        <svg class="w-12 h-12 mb-3 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <p>우측에 교정 결과가 표시됩니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = localStorage.getItem('gemini_api_key');
        if (!API_KEY) { window.location.href = 'index.html'; }

        function logout() {
            localStorage.removeItem('gemini_api_key');
            window.location.href = 'index.html';
        }
        
        async function runCorrection() {
            const inputText = document.getElementById("inputText").value.trim();
            if (inputText.length < 5) return alert("교정할 문장을 충분히 입력해주세요.");

            const btn = document.getElementById("submitBtn");
            const resultArea = document.getElementById("resultArea");
            
            btn.innerText = "⚡ AI 분석 및 교정 중...";
            btn.disabled = true;

            const systemInstruction = `당신은 포스코(POSCO) 투자엔지니어링실 전문 비즈니스 문장 검증 AI입니다.
반드시 아래 2단계 구조의 JSON 형식으로만 답변하세요. 다른 설명은 생략하세요.

1단계: 원문의 맥락을 유지한 오타 및 띄어쓰기 교정.
2단계: 포스코 특유의 간결하고 팩트 중심적인 '드라이 모드' 윤문 (수동태를 능동태로, 불필요한 수식어 제거).

{
  "step1_basic_correction": "교정 결과",
  "step2_advanced_suggestion": "윤문 결과",
  "step2_reasons": [{"before": "기존", "after": "변경", "reason": "이유"}]
}`;

            try {
                // 🚀 Quota 및 속도 문제를 해결하기 위해 gemini-1.5-flash 모델 사용
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: systemInstruction }] },
                        contents: [{ role: "user", parts: [{ text: inputText }] }],
                        generationConfig: { 
                            temperature: 0.1, 
                            responseMimeType: "application/json" 
                        }
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    if (response.status === 429) throw new Error("호출 한도(Quota)를 초과했습니다. 1분만 기다려주세요.");
                    throw new Error(`통신 에러: ${errData.error?.message || '권한 없음'}`);
                }

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(rawText);

                const reasonsHtml = (result.step2_reasons || []).map(item => 
                    `<li class="flex gap-2 text-sm border-b border-gray-100 pb-1">
                        <span class="text-red-400 line-through shrink-0">${item.before}</span>
                        <span class="text-blue-600 font-bold shrink-0">➔ ${item.after}</span>
                        <span class="text-gray-400 italic ml-auto">${item.reason}</span>
                    </li>`
                ).join("");

                resultArea.innerHTML = `
                    <div class="space-y-8 animate-fade-in">
                        <section>
                            <h2 class="flex items-center gap-2 text-sm font-bold text-gray-500 mb-2">
                                <span class="w-2 h-2 bg-green-500 rounded-full"></span> 1단계: 기본 교정 (오타/띄어쓰기)
                            </h2>
                            <div class="p-4 bg-gray-50 border rounded-lg text-gray-800 leading-relaxed whitespace-pre-wrap">${result.step1_basic_correction}</div>
                        </section>
                        
                        <section>
                            <h2 class="flex items-center gap-2 text-sm font-bold text-blue-600 mb-2">
                                <span class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></span> 2단계: 드라이 모드 (포스코 스타일 추천)
                            </h2>
                            <div class="p-4 bg-blue-50 border border-blue-100 rounded-lg text-blue-900 font-medium leading-relaxed whitespace-pre-wrap">${result.step2_advanced_suggestion}</div>
                            <ul class="mt-4 space-y-2 bg-white p-3 rounded border border-gray-100 shadow-sm">${reasonsHtml || "<li class='text-gray-400 text-sm'>• 추가 변경 사항 없음</li>"}</ul>
                        </section>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                alert("🚨 시스템 알림: " + error.message);
            } finally {
                btn.innerText = "포스코 모드로 교정 시작";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
