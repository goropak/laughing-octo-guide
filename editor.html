<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSCO Dry-Mode Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10 font-sans">

    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h1 class="text-2xl font-bold text-gray-800">POSCO Dry-Mode Editor</h1>
        <button onclick="logout()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 px-4 rounded font-bold">
            로그아웃
        </button>
    </div>
    
    <div class="grid grid-cols-2 gap-6">
        <div class="flex flex-col">
            <textarea id="inputText" class="p-4 border rounded shadow-sm h-96 resize-none focus:outline-blue-500" placeholder="보고서 초안을 붙여넣으세요..."></textarea>
            <button id="submitBtn" onclick="runCorrection()" class="mt-4 bg-blue-700 text-white font-bold py-3 rounded hover:bg-blue-800 transition duration-200">
                포스코 모드로 교정 시작
            </button>
        </div>

        <div id="resultArea" class="p-6 bg-white border rounded shadow-sm h-96 overflow-y-auto">
            <p class="text-gray-400 text-center mt-32">우측에 교정 결과가 표시됩니다.</p>
        </div>
    </div>

    <script>
        const API_KEY = localStorage.getItem('gemini_api_key');
        if (!API_KEY) {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('gemini_api_key');
            window.location.href = 'index.html';
        }
        
        async function runCorrection() {
            const inputText = document.getElementById("inputText").value;
            if (!inputText) return alert("텍스트를 입력해주세요.");

            const btn = document.getElementById("submitBtn");
            const resultArea = document.getElementById("resultArea");
            
            btn.innerText = "AI 분석 및 교정 중...";
            btn.disabled = true;

            const systemInstruction = `당신은 포스코(POSCO) 비즈니스 문장 검증 AI입니다. 
주어진 텍스트의 오타와 띄어쓰기를 교정하고, 포스코 특유의 간결한 비즈니스 톤앤매너(드라이 모드)로 윤문하세요.
반드시 아래 JSON 형식으로만 응답하세요:
{
  "step1_basic_correction": "오타만 수정한 결과",
  "step2_advanced_suggestion": "비즈니스 톤으로 윤문한 결과",
  "step2_reasons": [
    {"before": "기존", "after": "변경", "reason": "이유"}
  ]
}`;

            try {
                // API URL 및 Payload 구조 최신화
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        contents: [{ parts: [{ text: inputText }] }],
                        generationConfig: { 
                            temperature: 0.1, // 창의성 낮춤 (정확한 팩트와 구조 유지)
                            responseMimeType: "application/json" // JSON 강제
                        }
                    })
                });

                // 1. API 키 오류나 서버 에러를 구체적으로 잡아냄
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(`통신 에러(${response.status}): ${errData.error?.message || '알 수 없는 오류'}`);
                }

                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text;
                
                // 2. JSON 파싱 과정에서 에러가 나면 잡아냄
                let result;
                try {
                    result = JSON.parse(rawText.replace(/```json/g, '').replace(/```/g, '').trim());
                } catch (e) {
                    console.error("원본 응답:", rawText);
                    throw new Error("AI가 분석할 수 없는 짧은 텍스트거나 응답 형식이 깨졌습니다.");
                }

                // 결과 그리기
                const reasons = result.step2_reasons || [];
                let reasonsHtml = reasons.map(item => 
                    `<li>• <span class="line-through">${item.before}</span> ➔ <strong>${item.after}</strong> (${item.reason})</li>`
                ).join("");

                if(!reasonsHtml) reasonsHtml = "<li>• 추가로 변경할 비즈니스 문맥이 없습니다.</li>";

                resultArea.innerHTML = `
                    <div class="mb-6">
                        <h2 class="text-lg font-bold text-gray-700 border-b pb-2 mb-2">✅ 1단계: 기본 교정 (오타/띄어쓰기)</h2>
                        <p class="text-gray-800 bg-gray-50 p-3 rounded">${result.step1_basic_correction || "결과 없음"}</p>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-blue-700 border-b pb-2 mb-2">🚀 2단계: 드라이 모드 추천 (비즈니스 윤문)</h2>
                        <p class="text-gray-800 bg-blue-50 p-3 rounded font-medium">${result.step2_advanced_suggestion || "결과 없음"}</p>
                        <ul class="mt-3 text-sm text-gray-600 space-y-1">${reasonsHtml}</ul>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                // 화면에 정확히 어떤 에러인지 띄워줌
                alert("🚨 시스템 에러: " + error.message);
            } finally {
                btn.innerText = "포스코 모드로 교정 시작";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
