<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSCO Dry-Mode Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 md:p-10 font-sans">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h1 class="text-2xl font-bold text-gray-800">POSCO Dry-Mode Editor</h1>
            <div class="flex gap-2">
                <button onclick="resetApiKey()" class="text-sm bg-yellow-100 hover:bg-yellow-200 text-yellow-800 py-2 px-4 rounded font-bold">API 키 재설정</button>
                <button onclick="logout()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 px-4 rounded font-bold">로그아웃</button>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col">
                <textarea id="inputText" class="p-4 border rounded shadow-inner h-[500px] resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800" placeholder="교정할 초안을 입력하세요..."></textarea>
                <button id="submitBtn" onclick="runCorrection()" class="mt-4 bg-blue-800 text-white font-bold py-4 rounded-lg shadow-md hover:bg-blue-900 transition duration-200">포스코 모드로 교정 시작</button>
            </div>
            <div id="resultArea" class="p-6 bg-white border rounded shadow-sm h-[500px] overflow-y-auto">
                <p class="text-gray-400 text-center mt-32">우측에 교정 결과가 표시됩니다.</p>
            </div>
        </div>
    </div>
    <script>
        // ============================================
        // [수정 1] 모델명을 현재 사용 가능한 버전으로 교체
        // gemini-1.5-flash → gemini-2.5-flash
        // ============================================
        const MODEL_NAME = "gemini-2.5-flash";
        const API_KEY = localStorage.getItem('gemini_api_key');
        if (!API_KEY) window.location.href = 'index.html';

        function logout() {
            localStorage.removeItem('gemini_api_key');
            window.location.href = 'index.html';
        }

        // [수정 2] API 키 재설정 기능 추가 (키가 잘못됐을 때 바로 교체 가능)
        function resetApiKey() {
            localStorage.removeItem('gemini_api_key');
            window.location.href = 'index.html';
        }

        async function runCorrection() {
            const inputText = document.getElementById("inputText").value.trim();
            if (inputText.length < 5) return alert("교정할 문장을 충분히 입력해주세요.");

            const btn = document.getElementById("submitBtn");
            const resultArea = document.getElementById("resultArea");
            btn.innerText = "AI 분석 및 교정 중...";
            btn.disabled = true;
            btn.classList.add("opacity-50", "cursor-not-allowed");

            const systemInstruction = `당신은 포스코(POSCO) 투자엔지니어링실 전문 비즈니스 문장 검증 AI입니다.
반드시 아래 2단계 구조의 JSON 형식으로만 답변하세요. 다른 설명은 절대 생략하세요.

1단계: 원문의 맥락을 유지한 오타 및 띄어쓰기 교정. 전문 용어나 수치는 100% 보존.
2단계: 포스코 특유의 간결하고 팩트 중심적인 '드라이 모드' 윤문 (수동태를 능동태로, 불필요한 수식어 제거).

반드시 아래 JSON 형식으로만 응답:
{
  "step1_basic_correction": "교정 결과 텍스트",
  "step2_advanced_suggestion": "윤문 결과 텍스트",
  "step2_reasons": [{"before": "기존 표현", "after": "변경 표현", "reason": "변경 이유"}]
}`;

            try {
                // ============================================
                // [수정 3] API 엔드포인트의 모델명도 변수로 통일
                // ============================================
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            system_instruction: { parts: [{ text: systemInstruction }] },
                            contents: [{ role: "user", parts: [{ text: inputText }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    }
                );

                // ============================================
                // [수정 4] HTTP 상태 코드별 구체적 에러 메시지
                // ============================================
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    const errMsg = errData.error?.message || "";

                    if (response.status === 400) {
                        throw new Error(`요청 형식 오류(400): ${errMsg}`);
                    } else if (response.status === 403 || response.status === 401) {
                        throw new Error(`API 키가 유효하지 않습니다(${response.status}). [API 키 재설정] 버튼을 눌러 올바른 키를 다시 입력해주세요.`);
                    } else if (response.status === 404) {
                        throw new Error(`모델을 찾을 수 없습니다(404). 현재 모델: ${MODEL_NAME}. Google에서 모델이 변경되었을 수 있습니다.`);
                    } else if (response.status === 429) {
                        throw new Error(`API 호출 한도 초과(429). 잠시 후 다시 시도해주세요.`);
                    } else {
                        throw new Error(`서버 에러(${response.status}): ${errMsg}`);
                    }
                }

                const data = await response.json();

                // ============================================
                // [수정 5] 응답 구조 안전 검증
                // ============================================
                if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
                    throw new Error("AI가 빈 응답을 반환했습니다. 입력 내용을 조금 수정 후 다시 시도해주세요.");
                }

                const rawText = data.candidates[0].content.parts[0].text;

                // ============================================
                // [수정 6] JSON 파싱 안전장치 — 마크다운 코드블록 제거
                // ============================================
                let cleanedText = rawText.trim();
                if (cleanedText.startsWith("```")) {
                    cleanedText = cleanedText.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/, "");
                }

                let result;
                try {
                    result = JSON.parse(cleanedText);
                } catch (parseErr) {
                    console.error("JSON 파싱 실패. 원본 응답:", rawText);
                    throw new Error("AI 응답을 JSON으로 파싱할 수 없습니다. 다시 시도해주세요.");
                }

                // 결과 렌더링
                const reasonsHtml = (result.step2_reasons || []).map(item =>
                    `<li class="flex flex-wrap gap-2 text-sm border-b pb-2 mb-2">
                        <span class="text-red-500 line-through">${escapeHtml(item.before)}</span>
                        <span class="text-blue-600 font-bold">➔ ${escapeHtml(item.after)}</span>
                        <span class="text-gray-400 ml-auto text-xs">${escapeHtml(item.reason)}</span>
                    </li>`
                ).join("");

                resultArea.innerHTML = `
                    <div class="space-y-8">
                        <section>
                            <h2 class="text-sm font-bold text-gray-500 mb-2">1단계: 기본 교정</h2>
                            <div class="p-4 bg-gray-50 rounded-lg text-gray-800 whitespace-pre-wrap">${escapeHtml(result.step1_basic_correction)}</div>
                        </section>
                        <section>
                            <h2 class="text-sm font-bold text-blue-600 mb-2">2단계: 드라이 모드</h2>
                            <div class="p-4 bg-blue-50 rounded-lg text-blue-900 whitespace-pre-wrap">${escapeHtml(result.step2_advanced_suggestion)}</div>
                            <ul class="mt-4 space-y-2 bg-white p-3 rounded">${reasonsHtml || "<li class='text-gray-400 text-sm'>추가 변경 사항 없음</li>"}</ul>
                        </section>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                resultArea.innerHTML = `
                    <div class="text-center mt-20 space-y-4">
                        <p class="text-red-500 font-bold text-lg">오류 발생</p>
                        <p class="text-gray-600 text-sm">${escapeHtml(error.message)}</p>
                        <p class="text-gray-400 text-xs">콘솔(F12)에서 상세 로그를 확인할 수 있습니다.</p>
                    </div>
                `;
            } finally {
                btn.innerText = "포스코 모드로 교정 시작";
                btn.disabled = false;
                btn.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }

        // [수정 7] XSS 방지용 이스케이프 함수
        function escapeHtml(str) {
            if (!str) return "";
            const div = document.createElement("div");
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
    </script>
</body>
</html>
